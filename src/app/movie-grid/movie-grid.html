<h1 class="section_title">Trending Movies</h1>
<div class="movies_grid" role="list" aria-label="Trending movies grid">
    @if(isLoading()){
        @for(i of [1,2,3,4,5,6]; track i){
            <div class="skeleton_card" role="listitem" aria-label="Loading movie">
                <div class="skeleton_poster"></div>
                <div class="skeleton_info">
                    <div class="skeleton_card_title"></div>
                    <div class="skeleton_card_meta"></div>
                </div>
            </div>
        }
    } @else {
        @for(movie of movies; track movie.id){
            <div class="movie_card" (click)="viewDetails(movie)" (keydown.enter)="viewDetails(movie)" (keydown.space)="viewDetails(movie)" role="listitem" tabindex="0" [attr.aria-label]="movie.title + ', rated ' + movie.vote_average.toFixed(1)">
                <button class="bookmark_btn" [class.active]="bookmarkService.isBookmarked(movie.id)" (click)="toggleBookmark(movie, $event)" [attr.aria-label]="bookmarkService.isBookmarked(movie.id) ? 'Remove ' + movie.title + ' from bookmarks' : 'Add ' + movie.title + ' to bookmarks'">🔖</button>
                @if(movie.poster_path) {
                    <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" [alt]="movie.title + ' poster'" class="movie_poster">
                } @else {
                    <div class="movie_poster no-poster" role="img" [attr.aria-label]="movie.title + ' - no poster available'">🎬</div>
                }
                <div class="movie_info">
                    <h3 class="card_title">{{movie.title}}</h3>
                    <div class="movie_meta">
                        <span class="rating" aria-label="Rating {{movie.vote_average.toFixed(1)}} out of 10">⭐ {{movie.vote_average.toFixed(1)}}</span>
                        <span class="year" aria-label="Release year {{movie.release_date.split('-')[0]}}">{{movie.release_date.split('-')[0]}}</span>
                    </div>
                </div>
            </div>
        } @empty {
            <p class="no_movies" role="status">No Trending Movies Found</p>
        }
    }
</div>
